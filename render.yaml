services:
  - type: web
    name: swap-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: swap-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: swap-db
    databaseName: swap
    user: swap_user
    plan: free
